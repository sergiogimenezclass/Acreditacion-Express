<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Registro - Noche de los Oficios</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #faf8ff; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .scan-focus { position: relative; }
        .scan-focus::before {
            content: ''; position: absolute; top: 0; left: 0; width: 20px; height: 20px;
            border-top: 3px solid #2563eb; border-left: 3px solid #2563eb; border-radius: 4px 0 0 0;
        }
        .scan-focus::after {
            content: ''; position: absolute; bottom: 0; right: 0; width: 20px; height: 20px;
            border-bottom: 3px solid #2563eb; border-right: 3px solid #2563eb; border-radius: 0 0 4px 0;
        }
    </style>
</head>
<body class="bg-[#faf8ff] min-h-screen flex flex-col">
    <header class="bg-white flex items-center justify-between px-4 md:px-6 h-16 w-full shadow-sm sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-blue-600">school</span>
            <h1 class="text-lg font-bold text-blue-600 tracking-tight">Registro de Asistentes</h1>
        </div>
        <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
            <i data-lucide="user" class="w-5 h-5"></i>
        </div>
    </header>

    <main class="flex-grow container mx-auto max-w-lg px-4 py-6">
        <form id="registroForm">
            <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-6">
                <div class="p-6">
                    <div class="flex items-center gap-2 mb-6">
                        <i class="text-blue-600 w-5 h-5" data-lucide="user-plus"></i>
                        <h2 class="text-xl font-bold text-gray-900">Datos Personales</h2>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="text-sm font-semibold text-gray-600 block mb-1">Nombre Completo</label>
                            <input name="nombre" required class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition-all text-gray-900" placeholder="Ej: Juan Pérez" type="text"/>
                        </div>
                        <div>
                            <label class="text-sm font-semibold text-gray-600 block mb-1">Correo Electrónico</label>
                            <input name="email" required class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition-all text-gray-900" placeholder="juan.perez@ejemplo.com" type="email"/>
                        </div>
                        <div>
                            <label class="text-sm font-semibold text-gray-600 block mb-1">Teléfono (Opcional)</label>
                            <input name="telefono" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition-all text-gray-900" placeholder="Ej: 11 2233 4455" type="tel"/>
                        </div>
                    </div>
                </div>
            </div>

            <section id="cursoSection" class="mb-8">
                <div class="flex items-center gap-2 mb-4">
                    <i class="text-blue-600 w-5 h-5" data-lucide="book-open"></i>
                    <h2 class="text-xl font-bold text-gray-900">Nuestros Cursos (Elegí uno o más)</h2>
                </div>
                <div class="space-y-2" id="courseList">
                    <!-- Dinámico -->
                </div>
            </section>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all duration-200 mb-20 flex items-center justify-center gap-2">
                <i class="w-6 h-6" data-lucide="check-circle"></i>
                Registrarme Ahora
            </button>
        </form>

        <div id="mensajeExito" class="hidden text-center py-12">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-3xl font-bold text-gray-900 mb-2">¡Listo!</h2>
            <p class="text-gray-600 text-lg">Mirá la pantalla del stand, te están saludando.</p>
            <button onclick="location.reload()" class="mt-8 text-blue-600 font-bold underline">Registrar a otra persona</button>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const catalogoCursos = [
            { nombre: "Programación Web", cfp: "CFP N°11" },
            { nombre: "Diseño Web", cfp: "CFP N°11" },
            { nombre: "Diseño Gráfico", cfp: "CFP N°11" },
            { nombre: "Marketing Digital (11)", cfp: "CFP N°11" },
            { nombre: "Programación", cfp: "CFP N°27" },
            { nombre: "Programación con IA", cfp: "CFP N°27" },
            { nombre: "Productividad con IA", cfp: "CFP N°27" },
            { nombre: "Marketing Digital (27)", cfp: "CFP N°27" }
        ];

        const form = document.getElementById('registroForm');
        const courseList = document.getElementById('courseList');
        const mensajeExito = document.getElementById('mensajeExito');

        // Renderizar catálogo completo
        function renderCatalogo() {
            courseList.innerHTML = '';
            catalogoCursos.forEach((item, index) => {
                const badgeColor = item.cfp === "CFP N°11" ? "bg-blue-50 text-blue-600" : "bg-indigo-50 text-indigo-600";
                const row = `
                    <label class="flex items-center bg-white border border-gray-200 rounded-xl p-4 cursor-pointer hover:bg-gray-50 transition-colors shadow-sm">
                        <input class="hidden peer" name="curso_item" type="checkbox" value="${index}"/>
                        <div class="w-10 h-10 rounded-lg ${badgeColor} flex items-center justify-center mr-4">
                            <i class="w-6 h-6" data-lucide="star"></i>
                        </div>
                        <div class="flex-grow">
                            <p class="font-bold text-gray-900">${item.nombre}</p>
                            <span class="text-[10px] font-black uppercase tracking-tighter px-1.5 py-0.5 rounded ${badgeColor}">${item.cfp}</span>
                        </div>
                        <div class="w-6 h-6 rounded-md border-2 border-gray-200 peer-checked:border-blue-600 peer-checked:bg-blue-600 flex items-center justify-center transition-all">
                            <i data-lucide="check" class="text-white w-4 h-4 opacity-0 peer-checked:opacity-100"></i>
                        </div>
                    </label>
                `;
                courseList.innerHTML += row;
            });
            lucide.createIcons();
        }

        renderCatalogo();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const selectedIndices = Array.from(form.querySelectorAll('input[name="curso_item"]:checked')).map(i => parseInt(i.value));
            if (selectedIndices.length === 0) {
                alert('Por favor, seleccioná al menos un curso.');
                return;
            }

            const payload = new FormData();
            payload.append('nombre', form.nombre.value);
            payload.append('email', form.email.value);
            payload.append('telefono', form.telefono.value);

            const selectedCursos = selectedIndices.map(i => catalogoCursos[i]);
            const uniqueCFPs = [...new Set(selectedCursos.map(c => c.cfp))];
            
            payload.append('cfp', uniqueCFPs.join(', '));
            selectedCursos.forEach(c => payload.append('curso', c.nombre));

            try {
                const response = await fetch('/registro', {
                    method: 'POST',
                    body: payload
                });
                
                if (response.ok) {
                    form.classList.add('hidden');
                    mensajeExito.classList.remove('hidden');
                } else {
                    alert('Error al registrar. Reintentá por favor.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Falla de conexión.');
            }
        });
    </script>
</body>
</html>
