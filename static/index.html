<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Noche de los Oficios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-600 to-indigo-900 min-h-screen flex items-center justify-center p-4">
    
    <div class="glass w-full max-w-md rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">¡Bienvenido! 🚀</h1>
            <p class="text-gray-600 mt-2">Registrate en menos de 20 segundos</p>
        </div>

        <form id="registroForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nombre Completo</label>
                <input type="text" name="nombre" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-3 bg-white/50 border">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" name="email" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-3 bg-white/50 border">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Teléfono (Opcional)</label>
                <input type="tel" name="telefono" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-3 bg-white/50 border">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">¿Qué CFP visitás?</label>
                <select id="cfpSelect" name="cfp" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-3 bg-white/50 border">
                    <option value="">Seleccioná un CFP</option>
                    <option value="CFP N°11">CFP N°11 (Parque Patricios)</option>
                    <option value="CFP N°27">CFP N°27 (CABA)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Curso de interés</label>
                <select id="cursoSelect" name="curso" required disabled class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-3 bg-gray-100/50 border cursor-not-allowed">
                    <option value="">Primero elegí el CFP</option>
                </select>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition duration-300 shadow-lg mt-4">
                ¡Registrarme Ahora!
            </button>
        </form>

        <div id="mensajeExito" class="hidden text-center py-8">
            <div class="text-5xl mb-4">🎉</div>
            <h2 class="text-2xl font-bold text-gray-800">¡Listo!</h2>
            <p class="text-gray-600 mt-2">Mirá la pantalla del stand, te están saludando.</p>
            <button onclick="location.reload()" class="mt-6 text-indigo-600 font-semibold underline">Registrar a otra persona</button>
        </div>
    </div>

    <script>
        const cursos = {
            "CFP N°11": ["Programación Web", "Diseño Web", "Diseño Gráfico", "Marketing Digital"],
            "CFP N°27": ["Programación", "Programación con IA", "Productividad con IA", "Marketing Digital"]
        };

        const cfpSelect = document.getElementById('cfpSelect');
        const cursoSelect = document.getElementById('cursoSelect');
        const form = document.getElementById('registroForm');
        const mensajeExito = document.getElementById('mensajeExito');

        cfpSelect.addEventListener('change', (e) => {
            const selectedCFP = e.target.value;
            cursoSelect.innerHTML = '<option value="">Seleccioná un curso</option>';
            
            if (selectedCFP) {
                cursos[selectedCFP].forEach(curso => {
                    const option = document.createElement('option');
                    option.value = curso;
                    option.textContent = curso;
                    cursoSelect.appendChild(option);
                });
                cursoSelect.disabled = false;
                cursoSelect.classList.remove('bg-gray-100/50', 'cursor-not-allowed');
            } else {
                cursoSelect.disabled = true;
                cursoSelect.classList.add('bg-gray-100/50', 'cursor-not-allowed');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            
            try {
                const response = await fetch('/registro', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    form.classList.add('hidden');
                    mensajeExito.classList.remove('hidden');
                } else {
                    alert('Error al registrar. Reintentá por favor.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Falla de conexión. Avisale al encargado del stand.');
            }
        });
    </script>
</body>
</html>
