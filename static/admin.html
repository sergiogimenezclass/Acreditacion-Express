<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Acreditación Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Panel de Administración</h1>
            <button onclick="exportarCSV()" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-green-700 transition">
                Exportar a CSV 📥
            </button>
        </div>

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Fecha</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">CFP</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Curso</th>
                    </tr>
                </thead>
                <tbody id="leadsTable" class="bg-white divide-y divide-gray-200">
                    <!-- Los leads se cargan acá -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allLeads = [];

        async function cargarLeads() {
            try {
                const response = await fetch('/api/leads');
                allLeads = await response.json();
                
                const tableBody = document.getElementById('leadsTable');
                tableBody.innerHTML = '';

                allLeads.forEach(lead => {
                    const row = `
                        <tr>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${new Date(lead.fecha).toLocaleString()}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${lead.nombre}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${lead.email}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${lead.cfp}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${lead.curso}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error('Error al cargar leads:', error);
            }
        }

        function exportarCSV() {
            if (allLeads.length === 0) return alert('No hay datos para exportar');

            const headers = ['ID', 'Nombre', 'Email', 'Telefono', 'CFP', 'Curso', 'Fecha'];
            const rows = allLeads.map(l => [l.id, l.nombre, l.email, l.telefono, l.cfp, l.curso, l.fecha]);
            
            let csvContent = "data:text/csv;charset=utf-8," 
                + headers.join(",") + "\n"
                + rows.map(e => e.join(",")).join("\n");

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "leads_acreditacion_express.csv");
            document.body.appendChild(link);
            link.click();
        }

        // Cargar cada 10 segundos
        cargarLeads();
        setInterval(cargarLeads, 10000);
    </script>
</body>
</html>
