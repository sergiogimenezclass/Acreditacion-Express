<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin - Acreditación Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .blur-bg { backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Login Overlay -->
    <div id="loginOverlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/20 blur-bg transition-opacity duration-500">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100 transform transition-all">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="lock" class="w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-900">Acceso Privado</h2>
                <p class="text-slate-500">Ingresá la clave de la feria para continuar</p>
            </div>
            <div class="space-y-4">
                <input type="password" id="passInput" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-600 focus:ring-1 focus:ring-blue-600 outline-none transition-all text-center text-xl tracking-widest" placeholder="••••••••">
                <button onclick="checkPass()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                    Entrar al Panel
                </button>
                <p id="errorMsg" class="text-red-500 text-sm text-center hidden font-medium">Clave incorrecta, probá de nuevo.</p>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="adminContent" class="opacity-0 pointer-events-none transition-opacity duration-500 max-w-6xl mx-auto p-4 md:p-8">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Panel de Control</h1>
                <p class="text-slate-500">Monitoreo de acreditaciones en tiempo real</p>
            </div>
            <div class="flex gap-3">
                <button onclick="exportarCSV()" class="bg-emerald-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-emerald-700 transition shadow-lg shadow-emerald-200 flex items-center gap-2">
                    <i data-lucide="download" class="w-5 h-5"></i>
                    Exportar CSV
                </button>
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-1">Total Registros</p>
                <h3 id="statTotal" class="text-4xl font-black text-blue-600">0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-1">Última Hora</p>
                <h3 id="statRecent" class="text-4xl font-black text-indigo-600">0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-1">Estado Server</p>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
                    <h3 class="text-xl font-bold text-slate-800">Activo</h3>
                </div>
            </div>
        </div>

        <!-- Table Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-100">
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Fecha</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Nombre</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Email / Contacto</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">CFP</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Curso</th>
                        </tr>
                    </thead>
                    <tbody id="leadsTable" class="divide-y divide-slate-50 text-slate-700">
                        <!-- Leads list -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const PASS = "feria2026";
        
        lucide.createIcons();

        // Verificar sesión al cargar
        window.onload = () => {
            if (localStorage.getItem('adminAuthenticated') === 'true') {
                showAdminContent();
            }
        };

        function showAdminContent() {
            const overlay = document.getElementById('loginOverlay');
            const content = document.getElementById('adminContent');
            overlay.classList.add('opacity-0', 'pointer-events-none');
            content.classList.remove('opacity-0', 'pointer-events-none');
            cargarLeads();
            setInterval(cargarLeads, 10000);
        }

        function checkPass() {
            const input = document.getElementById('passInput').value;
            const error = document.getElementById('errorMsg');

            if (input === PASS) {
                localStorage.setItem('adminAuthenticated', 'true');
                showAdminContent();
            } else {
                error.classList.remove('hidden');
                document.getElementById('passInput').value = '';
                document.getElementById('passInput').focus();
            }
        }

        // Permitir entrar con "Enter"
        document.getElementById('passInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPass();
        });

        let allLeads = [];

        async function cargarLeads() {
            try {
                const response = await fetch('/api/leads');
                allLeads = await response.json();
                
                const tableBody = document.getElementById('leadsTable');
                const totalEl = document.getElementById('statTotal');
                const recentEl = document.getElementById('statRecent');
                
                tableBody.innerHTML = '';
                totalEl.innerText = allLeads.length;

                const oneHourAgo = new Date(Date.now() - 3600000);
                const recentCount = allLeads.filter(l => new Date(l.fecha) > oneHourAgo).length;
                recentEl.innerText = recentCount;

                allLeads.forEach(lead => {
                    const row = `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4 text-sm font-medium text-slate-500">${new Date(lead.fecha).toLocaleString()}</td>
                            <td class="px-6 py-4 text-sm font-bold text-slate-900">${lead.nombre}</td>
                            <td class="px-6 py-4 text-sm text-slate-600">
                                <div>${lead.email}</div>
                                <div class="text-xs text-slate-400">${lead.telefono || '-'}</div>
                            </td>
                            <td class="px-6 py-4 text-sm">
                                <span class="px-2 py-1 bg-blue-50 text-blue-600 rounded-md text-xs font-bold">${lead.cfp}</span>
                            </td>
                            <td class="px-6 py-4 text-sm font-medium text-slate-800">${lead.curso}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function exportarCSV() {
            if (allLeads.length === 0) return alert('No hay datos');
            const headers = ['ID', 'Nombre', 'Email', 'Telefono', 'CFP', 'Curso', 'Fecha'];
            const rows = allLeads.map(l => [l.id, l.nombre, l.email, l.telefono, l.cfp, l.curso, l.fecha]);
            let csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "leads_feria.csv");
            document.body.appendChild(link);
            link.click();
        }
    </script>
</body>
</html>
